version: "3"

tasks:
  build:ffi:
    desc: Build FFI static library for Go
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p ts-pack-ffi --release

  build:
    desc: Build Go bindings (requires FFI built first)
    deps: [build:ffi]
    dir: packages/go/v1
    cmds:
      - go build -tags tspack_dev ./...

  test:
    desc: Run Go unit tests
    deps: [build:ffi]
    dir: packages/go/v1
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - go test -tags tspack_dev -v ./...

  lint:
    desc: Lint and vet Go code (requires FFI built first)
    deps: [build:ffi]
    dir: packages/go/v1
    cmds:
      - go vet -tags tspack_dev ./...

  format:
    desc: Format Go code
    dir: packages/go/v1
    cmds:
      - gofmt -w .

  format:check:
    desc: Check Go formatting
    dir: packages/go/v1
    cmds:
      - test -z "$(gofmt -l .)"

  vendor:
    desc: Vendor FFI artifacts into Go package for distribution
    deps: [build:ffi]
    cmds:
      - python3 scripts/ci/go/vendor-ffi.py
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  vendor:clean:
    desc: Remove vendored FFI artifacts from Go package
    cmds:
      - python3 scripts/ci/go/vendor-ffi.py --clean
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  update:
    desc: Update Go dependencies
    dir: packages/go/v1
    cmds:
      - echo "Updating Go dependencies..."
      - go get -u ./...
      - go mod tidy

  clean:
    desc: Clean Go build cache
    dir: packages/go/v1
    cmds:
      - go clean -cache

  e2e:generate:
    desc: Generate Go E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang go
      - gofmt -w e2e/go/

  e2e:test:
    desc: Run Go E2E tests
    deps: [build:ffi]
    dir: e2e/go
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - go test -tags tspack_dev -v ./...
