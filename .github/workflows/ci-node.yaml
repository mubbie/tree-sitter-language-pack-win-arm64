name: CI Node

on:
  push:
    branches: [main]
    paths:
      - '.cargo/config.toml'
      - '.github/workflows/ci-node.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-node/**'
      - 'e2e/typescript/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'rust-toolchain.toml'
      - 'scripts/**'
      - '.task/node.yml'
  pull_request:
    branches: [main]
    paths:
      - '.cargo/config.toml'
      - '.github/workflows/ci-node.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-node/**'
      - 'e2e/typescript/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'rust-toolchain.toml'
      - 'scripts/**'
      - '.task/node.yml'
  workflow_dispatch:

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-node:
    name: Build Node.js (${{ matrix.platform }})
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Clippy (ts-pack-node)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: cargo clippy -p ts-pack-node -- -D warnings
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Report native module size
        shell: bash
        run: |
          echo "=== Node Native Module Artifacts ==="
          find crates/ts-pack-node -maxdepth 1 -name "*.node" -exec ls -lh {} \;

      - name: Upload native module
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: node-${{ matrix.platform }}
          path: crates/ts-pack-node/*.node
          if-no-files-found: error
          retention-days: 7

  test-node:
    name: Node.js Tests (${{ matrix.platform }})
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: build-node
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Download native module
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-${{ matrix.platform }}
          path: crates/ts-pack-node/

      - name: Smoke test native module
        shell: bash
        working-directory: crates/ts-pack-node
        run: node -e "const m = require('./'); console.log('Languages:', m.availableLanguages().length)"

      - name: Install E2E dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run E2E tests
        shell: bash
        working-directory: e2e/typescript
        run: npx vitest run
