name: CI Node

on:
  push:
    branches: [main]
    paths:
      - '.cargo/config.toml'
      - '.github/workflows/ci-node.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-node/**'
      - 'e2e/typescript/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'rust-toolchain.toml'
      - 'scripts/**'
      - '.task/node.yml'
  pull_request:
    branches: [main]
    paths:
      - '.cargo/config.toml'
      - '.github/workflows/ci-node.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-node/**'
      - 'e2e/typescript/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'rust-toolchain.toml'
      - 'scripts/**'
      - '.task/node.yml'
  workflow_dispatch:

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v4
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-node:
    name: Build Node.js (${{ matrix.platform }})
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: rust-node-${{ matrix.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-node-${{ matrix.platform }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Clippy (ts-pack-node)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: cargo clippy -p ts-pack-node -- -D warnings
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Report native module size
        shell: bash
        run: |
          echo "=== Node Native Module Artifacts ==="
          find crates/ts-pack-node -maxdepth 1 -name "*.node" -exec ls -lh {} \;

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform }}
          path: crates/ts-pack-node/*.node
          if-no-files-found: error
          retention-days: 7

  test-node:
    name: Node.js Tests (${{ matrix.platform }})
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: build-node
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: node-${{ matrix.platform }}
          path: crates/ts-pack-node/

      - name: Smoke test native module
        shell: bash
        working-directory: crates/ts-pack-node
        run: node -e "const m = require('./'); console.log('Languages:', m.availableLanguages().length)"

      - name: Install E2E dependencies
        working-directory: e2e/typescript
        run: npm install

      - name: Run E2E tests
        shell: bash
        working-directory: e2e/typescript
        run: npx vitest run
