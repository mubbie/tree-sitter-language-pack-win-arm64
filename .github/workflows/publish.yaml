name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.1)"
        required: true
        type: string
      dry_run:
        description: "Dry run (prepare artifacts without publishing)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets (all, python, node, crates, go, ruby, wasm)"
        required: false
        type: string
        default: "all"
      force_republish:
        description: "Force re-publish even if version already exists on registries"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  # ─── Prepare ───────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      publish_python: ${{ steps.targets.outputs.python }}
      publish_node: ${{ steps.targets.outputs.node }}
      publish_crates: ${{ steps.targets.outputs.crates }}
      publish_go: ${{ steps.targets.outputs.go }}
      publish_ruby: ${{ steps.targets.outputs.ruby }}
      publish_wasm: ${{ steps.targets.outputs.wasm }}
    steps:
      - name: Extract version and flags
        id: meta
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          {
            echo "version=$version"
            echo "dry_run=${{ inputs.dry_run }}"
            echo "force_republish=${{ inputs.force_republish }}"
          } >> "$GITHUB_OUTPUT"

      - name: Determine targets
        id: targets
        run: |
          targets="${{ inputs.targets }}"
          for target in python node crates go ruby wasm; do
            if [[ "$targets" == "all" || "$targets" == *"$target"* ]]; then
              echo "$target=true" >> "$GITHUB_OUTPUT"
            else
              echo "$target=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Release info
        run: |
          {
            echo "## Release Configuration"
            echo "- **Tag**: ${{ inputs.tag }}"
            echo "- **Version**: ${{ steps.meta.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Force republish**: ${{ inputs.force_republish }}"
            echo "- **Targets**: ${{ inputs.targets }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Validate versions ──────────────────────────────────────────────
  validate-versions:
    name: Validate version consistency
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify Cargo.toml version matches tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CARGO_VERSION=$(grep -A2 '\[workspace\.package\]' Cargo.toml | grep 'version' | sed 's/.*version = "\(.*\)"/\1/')
          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag version ($VERSION)"
            exit 1
          fi
          echo "Version $VERSION matches across Cargo.toml and tag"

      - name: Verify Node.js package version (if applicable)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-node/package.json ]; then
            NODE_VERSION=$(python3 -c "import json; print(json.load(open('crates/ts-pack-node/package.json'))['version'])")
            if [[ "$NODE_VERSION" != "$VERSION" ]]; then
              echo "::error::Node.js package version ($NODE_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
          fi

      - name: Verify WASM package version (if applicable)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-wasm/package.json ]; then
            WASM_VERSION=$(python3 -c "import json; print(json.load(open('crates/ts-pack-wasm/package.json'))['version'])")
            if [[ "$WASM_VERSION" != "$VERSION" ]]; then
              echo "::error::WASM package version ($WASM_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
          fi

      - name: Verify Ruby gemspec version (if applicable)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # Ruby uses dots instead of hyphens for pre-release: 1.0.0.rc.1
          RUBY_VERSION="${VERSION//-/.}"
          if [ -f crates/ts-pack-ruby/tree_sitter_language_pack.gemspec ]; then
            GEMSPEC_VERSION=$(grep "spec.version" crates/ts-pack-ruby/tree_sitter_language_pack.gemspec | sed "s/.*'\(.*\)'/\1/")
            if [[ "$GEMSPEC_VERSION" != "$RUBY_VERSION" ]]; then
              echo "::error::Gemspec version ($GEMSPEC_VERSION) does not match tag version ($RUBY_VERSION)"
              exit 1
            fi
          fi

      - name: Version summary
        run: |
          {
            echo "## Version Validation"
            echo "All package manifests match version **${{ needs.prepare.outputs.version }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Registry checks ──────────────────────────────────────────────
  check-cratesio:
    name: Check crates.io
    needs: prepare
    if: needs.prepare.outputs.publish_crates == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 \
              "https://crates.io/api/v1/crates/ts-pack-core/$VERSION")
            if [[ "$STATUS" == "200" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "ts-pack-core $VERSION already published on crates.io"
              exit 0
            elif [[ "$STATUS" == "404" ]]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: unexpected status $STATUS, retrying..."
            sleep $((attempt * 5))
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"

  check-pypi:
    name: Check PyPI
    needs: prepare
    if: needs.prepare.outputs.publish_python == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 \
              "https://pypi.org/pypi/tree-sitter-language-pack/$VERSION/json")
            if [[ "$STATUS" == "200" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "tree-sitter-language-pack $VERSION already published on PyPI"
              exit 0
            elif [[ "$STATUS" == "404" ]]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: unexpected status $STATUS, retrying..."
            sleep $((attempt * 5))
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"

  check-npm:
    name: Check npm
    needs: prepare
    if: needs.prepare.outputs.publish_node == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 \
              "https://registry.npmjs.org/@tree-sitter-language-pack%2Fnode/$VERSION")
            if [[ "$STATUS" == "200" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "@tree-sitter-language-pack/node $VERSION already published on npm"
              exit 0
            elif [[ "$STATUS" == "404" ]]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: unexpected status $STATUS, retrying..."
            sleep $((attempt * 5))
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"

  check-rubygems:
    name: Check RubyGems
    needs: prepare
    if: needs.prepare.outputs.publish_ruby == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # Ruby uses dots instead of hyphens for pre-release: 1.0.0.rc.1
          RUBY_VERSION="${VERSION//-/.}"
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            RESPONSE=$(curl -s --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 \
              -w "\n%{http_code}" \
              "https://rubygems.org/api/v1/versions/tree_sitter_language_pack.json")
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            if [[ "$STATUS" == "200" ]]; then
              # Check if our specific version exists in the versions list
              if echo "$BODY" | python3 -c "
          import sys, json
          versions = json.load(sys.stdin)
          target = '$RUBY_VERSION'
          found = any(v.get('number') == target for v in versions)
          print('true' if found else 'false')
          " 2>/dev/null | grep -q "true"; then
                echo "exists=true" >> "$GITHUB_OUTPUT"
                echo "tree_sitter_language_pack $RUBY_VERSION already published on RubyGems"
                exit 0
              else
                echo "exists=false" >> "$GITHUB_OUTPUT"
                echo "tree_sitter_language_pack $RUBY_VERSION not found on RubyGems"
                exit 0
              fi
            elif [[ "$STATUS" == "404" ]]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "tree_sitter_language_pack gem not found on RubyGems (new gem)"
              exit 0
            fi
            echo "Attempt $attempt: unexpected status $STATUS, retrying..."
            sleep $((attempt * 5))
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"

  check-npm-wasm:
    name: Check npm (WASM)
    needs: prepare
    if: needs.prepare.outputs.publish_wasm == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 \
              "https://registry.npmjs.org/@kreuzberg%2Ftree-sitter-language-pack-wasm/$VERSION")
            if [[ "$STATUS" == "200" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "@kreuzberg/tree-sitter-language-pack-wasm $VERSION already published on npm"
              exit 0
            elif [[ "$STATUS" == "404" ]]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: unexpected status $STATUS, retrying..."
            sleep $((attempt * 5))
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"

  # ─── Clone vendors ────────────────────────────────────────────────
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers

  # ─── Publish Rust crates ──────────────────────────────────────────
  publish-crates:
    name: Publish Rust crates
    needs: [prepare, validate-versions, clone-vendors, check-cratesio]
    if: |
      always() &&
      needs.prepare.outputs.publish_crates == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.prepare.outputs.force_republish == 'true' || needs.check-cratesio.outputs.exists != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Dry run - verify crate packaging
        if: ${{ inputs.dry_run }}
        run: |
          cargo package -p ts-pack-core --allow-dirty 2>&1 | tail -5
          cargo package -p ts-pack-ffi --allow-dirty 2>&1 | tail -5
          {
            echo "## Crates Dry Run"
            echo "- ts-pack-core: packaged successfully"
            echo "- ts-pack-ffi: packaged successfully"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Publish ts-pack-core
        if: ${{ !inputs.dry_run }}
        run: |
          output=$(cargo publish -p ts-pack-core 2>&1) || {
            if echo "$output" | grep -qiE "(already uploaded|already exists)"; then
              echo "::notice::ts-pack-core already published; skipping."
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Wait for ts-pack-core indexing
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Waiting for ts-pack-core to be indexed on crates.io..."
          VERSION="${{ needs.prepare.outputs.version }}"
          for attempt in $(seq 1 15); do
            sleep_time=$((2 ** attempt > 64 ? 64 : 2 ** attempt))
            sleep "$sleep_time"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/ts-pack-core/$VERSION")
            if [[ "$STATUS" == "200" ]]; then
              echo "ts-pack-core $VERSION indexed successfully"
              exit 0
            fi
            echo "Attempt $attempt: not yet indexed (status=$STATUS), waiting ${sleep_time}s..."
          done
          echo "::warning::ts-pack-core indexing timed out, attempting ts-pack-ffi publish anyway"

      - name: Publish ts-pack-ffi
        if: ${{ !inputs.dry_run }}
        run: |
          output=$(cargo publish -p ts-pack-ffi 2>&1) || {
            if echo "$output" | grep -qiE "(already uploaded|already exists)"; then
              echo "::notice::ts-pack-ffi already published; skipping."
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}

  # ─── Build & Publish Python ───────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel (${{ matrix.os }})
    needs: [prepare, validate-versions, clone-vendors, check-pypi]
    if: |
      always() &&
      needs.prepare.outputs.publish_python == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.prepare.outputs.force_republish == 'true' || needs.check-pypi.outputs.exists != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/ts-pack-python/Cargo.toml --out dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/*.whl

  publish-python:
    name: Publish Python to PyPI
    needs: [prepare, build-python-wheels]
    if: |
      always() &&
      needs.prepare.outputs.publish_python == 'true' &&
      needs.build-python-wheels.result == 'success'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: kreuzberg-dev/actions/publish-pypi@v1
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  # ─── Build & Publish Node.js ──────────────────────────────────────
  build-node-native:
    name: Build Node.js (${{ matrix.os }})
    needs: [prepare, validate-versions, clone-vendors, check-npm]
    if: |
      always() &&
      needs.prepare.outputs.publish_node == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.prepare.outputs.force_republish == 'true' || needs.check-npm.outputs.exists != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.os }}
          path: crates/ts-pack-node/*.node

  publish-node:
    name: Publish Node.js to npm
    needs: [prepare, build-node-native]
    if: |
      always() &&
      needs.prepare.outputs.publish_node == 'true' &&
      needs.build-node-native.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all native modules
        uses: actions/download-artifact@v4
        with:
          path: crates/ts-pack-node
          pattern: node-native-*
          merge-multiple: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## npm Dry Run"
            echo "Native modules staged for npm:"
            echo '```'
            ls -1 crates/ts-pack-node/*.node
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://registry.npmjs.org/@tree-sitter-language-pack%2Fnode/$VERSION")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Package already on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        working-directory: crates/ts-pack-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Build Ruby native gems ─────────────────────────────────────
  build-ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors, check-rubygems]
    if: |
      always() &&
      needs.prepare.outputs.publish_ruby == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.prepare.outputs.force_republish == 'true' || needs.check-rubygems.outputs.exists != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ruby_platform: x86_64-linux
          - os: ubuntu-24.04-arm
            label: linux-arm64
            ruby_platform: aarch64-linux
          - os: macos-latest
            label: macos-arm64
            ruby_platform: arm64-darwin
    timeout-minutes: 120
    env:
      RB_SYS_CARGO_PROFILE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        run: gem install bundler --no-document && bundler --version

      - name: Set up Python (for vendor script)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vendor ts-pack-core into Ruby package
        run: python3 scripts/ci/ruby/vendor-core.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Install Ruby dependencies
        working-directory: crates/ts-pack-ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install

      - name: Compile native extension
        working-directory: crates/ts-pack-ruby
        timeout-minutes: 60
        run: |
          echo "Compiling native extension..."
          bundle exec rake compile
          echo "Native extension compiled successfully"
          echo "=== Native libraries ==="
          find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/crates/ts-pack-ruby/target

      - name: Build platform gem
        working-directory: crates/ts-pack-ruby
        run: gem build ./*.gemspec

      - name: Verify gem was built
        working-directory: crates/ts-pack-ruby
        run: |
          if ! ls ./*.gem 1>/dev/null 2>&1; then
            echo "ERROR: No gem file found" >&2
            ls -la >&2
            exit 1
          fi
          echo "Gem built successfully:"
          ls -lh ./*.gem

      - name: Verify gem integrity
        working-directory: crates/ts-pack-ruby
        run: |
          for gem in ./*.gem; do
            echo "Validating: $gem"
            file "$gem"
            if ! gem spec "$gem" >/dev/null 2>&1; then
              echo "WARNING: gem spec check failed for $gem"
              # Verify it's at least a valid archive
              if ! tar -tzf "$gem" >/dev/null 2>&1; then
                echo "ERROR: Corrupted gem file: $gem" >&2
                exit 1
              fi
            else
              echo "gem spec validation passed"
            fi
          done

      - name: Upload gem artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rubygems-${{ matrix.label }}
          path: crates/ts-pack-ruby/*.gem
          retention-days: 14
          compression-level: 0

  # ─── Publish Ruby gems ──────────────────────────────────────────
  publish-ruby:
    name: Publish Ruby gems
    needs: [prepare, validate-versions, check-rubygems, build-ruby-gem]
    if: |
      always() &&
      needs.prepare.outputs.publish_ruby == 'true' &&
      needs.build-ruby-gem.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: none
          bundler-cache: false

      - name: Download Ruby gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rubygems-*
          path: dist
          merge-multiple: true

      - name: Set up Python (for vendor script)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source gem (fallback for unsupported platforms)
        working-directory: crates/ts-pack-ruby
        run: |
          gem build ./*.gemspec
          cp ./*.gem ../../dist/ 2>/dev/null || true
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: List all gems for publishing
        working-directory: dist
        run: |
          echo "=== All gems to publish ==="
          ls -lh tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems found)"
          echo ""
          gem_count=$(find . -maxdepth 1 -name 'tree_sitter_language_pack-*.gem' -print | wc -l)
          echo "Total gems: $gem_count"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## RubyGems Dry Run"
            echo "Gems staged for RubyGems:"
            echo '```'
            ls -1 dist/tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check RubyGems before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          RUBY_VERSION="${VERSION//-/.}"
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 30 \
            -w "\n%{http_code}" \
            "https://rubygems.org/api/v1/versions/tree_sitter_language_pack.json")
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [[ "$STATUS" == "200" ]]; then
            if echo "$BODY" | python3 -c "
          import sys, json
          versions = json.load(sys.stdin)
          target = '$RUBY_VERSION'
          found = any(v.get('number') == target for v in versions)
          print('true' if found else 'false')
          " 2>/dev/null | grep -q "true"; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Gem already published; skipping."
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish gems to RubyGems
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        working-directory: dist
        run: |
          publish_count=0
          for gem in tree_sitter_language_pack-*.gem; do
            [ -f "$gem" ] || continue
            echo "Publishing $gem..."
            output=$(gem push "$gem" 2>&1) || {
              if echo "$output" | grep -qiE "(already been pushed|repushing|already exists)"; then
                echo "::notice::$gem already published; skipping."
                continue
              else
                echo "$output"
                exit 1
              fi
            }
            echo "$output"
            publish_count=$((publish_count + 1))
          done
          echo "Published $publish_count gem(s) successfully"
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}

  # ─── Build & Publish WASM ─────────────────────────────────────────
  build-wasm:
    name: Build WASM package
    needs: [prepare, validate-versions, clone-vendors, check-npm-wasm]
    if: |
      always() &&
      needs.prepare.outputs.publish_wasm == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.prepare.outputs.force_republish == 'true' || needs.check-npm-wasm.outputs.exists != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        working-directory: crates/ts-pack-wasm
        run: wasm-pack build --target web --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Verify WASM build output
        working-directory: crates/ts-pack-wasm
        run: |
          if [ ! -d pkg ]; then
            echo "ERROR: pkg/ directory not created by wasm-pack" >&2
            exit 1
          fi
          echo "=== WASM build output ==="
          ls -lh pkg/
          if [ ! -f pkg/ts_pack_wasm_bg.wasm ]; then
            echo "ERROR: WASM binary not found" >&2
            exit 1
          fi
          echo "WASM binary size: $(wc -c < pkg/ts_pack_wasm_bg.wasm) bytes"

      - name: Upload WASM package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/ts-pack-wasm/pkg/

  publish-wasm:
    name: Publish WASM to npm
    needs: [prepare, build-wasm]
    if: |
      always() &&
      needs.prepare.outputs.publish_wasm == 'true' &&
      needs.build-wasm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download WASM package
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: crates/ts-pack-wasm/pkg

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## npm WASM Dry Run"
            echo "WASM package staged for npm:"
            echo '```'
            ls -1 crates/ts-pack-wasm/pkg/
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://registry.npmjs.org/@kreuzberg%2Ftree-sitter-language-pack-wasm/$VERSION")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::WASM package already on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        working-directory: crates/ts-pack-wasm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Waiting for @kreuzberg/tree-sitter-language-pack-wasm@$VERSION to be indexed..."
          for attempt in $(seq 1 20); do
            sleep_time=$((attempt * 3))
            sleep "$sleep_time"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://registry.npmjs.org/@kreuzberg%2Ftree-sitter-language-pack-wasm/$VERSION")
            if [[ "$STATUS" == "200" ]]; then
              echo "Package indexed successfully"
              exit 0
            fi
            echo "Attempt $attempt: not yet indexed (status=$STATUS), waiting ${sleep_time}s..."
          done
          echo "::warning::npm indexing timed out after all attempts"

  # ─── Build Go FFI libraries ──────────────────────────────────────
  build-go-ffi:
    name: Build Go FFI (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: |
      always() &&
      needs.prepare.outputs.publish_go == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/ts-pack-ffi/lib staging/ts-pack-ffi/include
          cp target/release/libts_pack_ffi.a staging/ts-pack-ffi/lib/
          cp crates/ts-pack-ffi/include/ts_pack.h staging/ts-pack-ffi/include/
          cd staging && tar -czf "../ts-pack-ffi-${{ matrix.label }}.tar.gz" ts-pack-ffi/

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging/ts-pack-ffi/lib staging/ts-pack-ffi/include
          cp target/release/ts_pack_ffi.lib staging/ts-pack-ffi/lib/ 2>/dev/null || cp target/release/libts_pack_ffi.a staging/ts-pack-ffi/lib/
          cp crates/ts-pack-ffi/include/ts_pack.h staging/ts-pack-ffi/include/
          cd staging && tar -czf "../ts-pack-ffi-${{ matrix.label }}.tar.gz" ts-pack-ffi/

      - name: Upload FFI artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-ffi-${{ matrix.label }}
          path: ts-pack-ffi-${{ matrix.label }}.tar.gz
          retention-days: 14

  # ─── GitHub Release ───────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs:
      - prepare
      - validate-versions
      - check-cratesio
      - check-pypi
      - check-npm
      - check-rubygems
      - check-npm-wasm
      - publish-crates
      - publish-python
      - publish-node
      - publish-ruby
      - publish-wasm
      - build-go-ffi
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download Go FFI artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: go-ffi-*
          merge-multiple: true
        continue-on-error: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## GitHub Release Dry Run"
            echo "Would create release **${{ inputs.tag }}** with artifacts:"
            echo '```'
            ls -1 release-assets/ts-pack-ffi-*.tar.gz 2>/dev/null || echo "(no Go FFI artifacts)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ inputs.tag }}"

          # Delete existing release if force_republish
          if [[ "${{ inputs.force_republish }}" == "true" ]]; then
            gh release delete "$TAG" --yes 2>/dev/null || true
          fi

          # Find any Go FFI artifacts to attach
          ASSETS=""
          for f in release-assets/ts-pack-ffi-*.tar.gz; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            ${ASSETS}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Aggregate release status
        if: always()
        env:
          CHECK_CRATESIO_EXISTS: ${{ needs.check-cratesio.outputs.exists || '' }}
          CHECK_PYPI_EXISTS: ${{ needs.check-pypi.outputs.exists || '' }}
          CHECK_NPM_EXISTS: ${{ needs.check-npm.outputs.exists || '' }}
          CHECK_RUBYGEMS_EXISTS: ${{ needs.check-rubygems.outputs.exists || '' }}
          CHECK_NPM_WASM_EXISTS: ${{ needs.check-npm-wasm.outputs.exists || '' }}
          RESULT_VALIDATE: ${{ needs.validate-versions.result }}
          RESULT_PUBLISH_CRATES: ${{ needs.publish-crates.result }}
          RESULT_PUBLISH_PYTHON: ${{ needs.publish-python.result }}
          RESULT_PUBLISH_NODE: ${{ needs.publish-node.result }}
          RESULT_PUBLISH_RUBY: ${{ needs.publish-ruby.result }}
          RESULT_PUBLISH_WASM: ${{ needs.publish-wasm.result }}
          RESULT_BUILD_GO_FFI: ${{ needs.build-go-ffi.result }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"

            if [[ "$RESULT_VALIDATE" != "success" ]]; then
              echo "| version-check | **FAILED** |"
            else
              echo "| version-check | passed |"
            fi

            declare -A results
            results[crates]="${RESULT_PUBLISH_CRATES}"
            results[python]="${RESULT_PUBLISH_PYTHON}"
            results[node]="${RESULT_PUBLISH_NODE}"
            results[ruby]="${RESULT_PUBLISH_RUBY}"
            results[wasm]="${RESULT_PUBLISH_WASM}"
            results[go-ffi]="${RESULT_BUILD_GO_FFI}"

            declare -A checks
            checks[crates]="${CHECK_CRATESIO_EXISTS}"
            checks[python]="${CHECK_PYPI_EXISTS}"
            checks[node]="${CHECK_NPM_EXISTS}"
            checks[ruby]="${CHECK_RUBYGEMS_EXISTS}"
            checks[wasm]="${CHECK_NPM_WASM_EXISTS}"

            for target in crates python node ruby wasm go-ffi; do
              result="${results[$target]}"
              check="${checks[$target]:-}"
              if [[ "$result" == "success" ]]; then
                echo "| $target | published |"
              elif [[ "$check" == "true" ]]; then
                echo "| $target | already exists (skipped) |"
              elif [[ "$result" == "skipped" ]]; then
                echo "| $target | skipped (not enabled) |"
              elif [[ "$result" == "failure" ]]; then
                echo "| $target | **FAILED** |"
              else
                echo "| $target | $result |"
              fi
            done

            echo ""
            echo "- **Tag**: ${{ inputs.tag }}"
            echo "- **Version**: ${{ needs.prepare.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Force republish**: ${{ inputs.force_republish }}"
          } >> "$GITHUB_STEP_SUMMARY"
