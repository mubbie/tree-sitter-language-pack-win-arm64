  # ─── Build Elixir NIFs ────────────────────────────────────────────
  build-elixir-nifs:
    name: Build Elixir NIF (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build Elixir NIF
        working-directory: crates/ts-pack-elixir
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Package NIF libraries (NIF 2.16)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.16"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.so"
          fi

          mkdir -p dist/elixir
          ARTIFACT_NAME="libts_pack_elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          TARBALL="${ARTIFACT_NAME}.tar.gz"

          LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            exit 1
          fi

          cp "$LIB_PATH" "${ARTIFACT_NAME}"
          tar -czf "dist/elixir/${TARBALL}" "${ARTIFACT_NAME}"
          echo "Created: dist/elixir/${TARBALL}"

      - name: Package NIF libraries (NIF 2.17)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.17"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.so"
          fi

          ARTIFACT_NAME="libts_pack_elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          TARBALL="${ARTIFACT_NAME}.tar.gz"

          LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            exit 1
          fi

          cp "$LIB_PATH" "${ARTIFACT_NAME}"
          tar -czf "dist/elixir/${TARBALL}" "${ARTIFACT_NAME}"
          echo "Created: dist/elixir/${TARBALL}"

      - name: Upload NIF artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: elixir-${{ matrix.label }}
          path: dist/elixir/*.tar.gz
          if-no-files-found: error
