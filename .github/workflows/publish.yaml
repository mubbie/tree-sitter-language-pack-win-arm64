name: Publish Windows ARM64 Wheel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream release tag to build (e.g., v1.0.0-rc.6)"
        required: true
        type: string
      dry_run:
        description: "Dry run without publishing to PyPI"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

permissions:
  contents: read

jobs:
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6.3.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5.0.5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 3

  build-wheel:
    name: Build Python wheel (windows-aarch64)
    needs: clone-vendors
    runs-on: windows-11-arm
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/ts-pack-python/Cargo.toml --out dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7.0.0
        with:
          name: python-wheel-windows-aarch64
          path: dist/*.whl
          retention-days: 14

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheel
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-wheel-windows-aarch64
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
