name: CI Go

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-go.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-go/**'
      - 'e2e/go/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/go.yml'
      - 'Taskfile.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-go.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-go/**'
      - 'e2e/go/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/go.yml'
      - 'Taskfile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-go-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-ffi:
    name: Build FFI library
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Build FFI library
        run: task go:build:ffi
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ffi-go-linux
          path: |
            target/release/libts_pack_ffi.a
            target/release/libts_pack_ffi.so
            crates/ts-pack-ffi/include/
          retention-days: 1

  test-go:
    name: Go Tests
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ffi-go-linux
          path: ffi-artifacts

      - name: Restore FFI to expected paths
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true
          # Place in path CGO expects (relative to crates/ts-pack-go/)
          mkdir -p crates/ts-pack-ffi/target/release
          cp target/release/libts_pack_ffi.* crates/ts-pack-ffi/target/release/ 2>/dev/null || true

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.22"
          cache-dependency-path: crates/ts-pack-go/go.sum

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Run Go tests
        run: task go:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run Go lint
        run: task go:lint
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Check Go formatting
        run: task go:format:check

  e2e-go:
    name: Go E2E Tests
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ffi-go-linux
          path: ffi-artifacts

      - name: Restore FFI to expected paths
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true
          # Place in path CGO expects (relative to crates/ts-pack-go/)
          mkdir -p crates/ts-pack-ffi/target/release
          cp target/release/libts_pack_ffi.* crates/ts-pack-ffi/target/release/ 2>/dev/null || true

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.22"
          cache-dependency-path: crates/ts-pack-go/go.sum

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Generate E2E tests
        run: task go:e2e:generate
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run E2E tests
        run: task go:e2e:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
