name: CI Python

on:
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-python/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/python/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".github/workflows/ci-python.yaml"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/python.yml"
      - "Taskfile.yml"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-python/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/python/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".github/workflows/ci-python.yaml"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/python.yml"
      - "Taskfile.yml"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: ci-python-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v4
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-python:
    name: Build Python wheel (${{ matrix.platform }})
    needs: clone-vendors
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Clippy (ts-pack-python)
        if: matrix.platform == 'linux-x86_64'
        run: cargo clippy -p ts-pack-python -- -D warnings
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/ts-pack-python/Cargo.toml --out dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  test-python:
    name: Test Python (${{ matrix.python-version }}, ${{ matrix.platform }})
    needs: build-python
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            python-version: "3.10"
          - os: ubuntu-latest
            platform: linux-x86_64
            python-version: "3.12"
          - os: macos-latest
            platform: macos-arm64
            python-version: "3.10"
          - os: macos-latest
            platform: macos-arm64
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist

      - name: Install wheel
        run: |
          wheel_file=$(find dist -name '*.whl' -print -quit)
          pip install "$wheel_file" tree-sitter pytest

      - name: Generate E2E tests
        run: cargo run -p e2e-generator -- generate --lang python
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run E2E tests
        run: cd e2e/python && pip install -e . && pytest tests/ -v
        env:
          PROJECT_ROOT: ${{ github.workspace }}
