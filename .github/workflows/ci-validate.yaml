name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  validate:
    name: Validate (Lint & Format)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # --- Rust ---
      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0
        with:
          use-sccache: "false"
          install-llvm-cov: "false"

      # --- Python ---
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --no-install-project

      # --- Node.js (for biome) ---
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install biome
        run: npm install -g @biomejs/biome

      # --- Ruby ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6 # v1.292.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: crates/ts-pack-ruby

      # --- Go ---
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"
          cache-dependency-path: crates/ts-pack-go/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.1.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- Java ---
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "24"

      # --- Elixir ---
      - name: Setup Elixir
        uses: erlef/setup-elixir@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1.22.0
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Elixir dependencies
        run: cd crates/ts-pack-elixir && mix deps.get

      # --- C/C++ ---
      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      # --- Task runner ---
      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0

      # --- Prek ---
      - name: Run prek hooks
        uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1
        with:
          extra-args: --all-files

  readme-check:
    name: README validation
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

      - name: Check README generation
        run: uv run scripts/generate_readme.py --validate
