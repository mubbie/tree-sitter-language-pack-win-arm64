name: CI Java

on:
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-java/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/java/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/java.yml"
      - "Taskfile.yml"
      - "scripts/**"
      - ".github/workflows/ci-java.yaml"
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-java/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/java/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/java.yml"
      - "Taskfile.yml"
      - "scripts/**"
      - ".github/workflows/ci-java.yaml"
  workflow_dispatch:

concurrency:
  group: ci-java-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5.0.3
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-ffi:
    name: Build FFI library
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ffi-linux
          path: |
            target/release/libts_pack_ffi.so
            crates/ts-pack-ffi/include/
          retention-days: 1

  test-java:
    name: Java unit tests
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ffi-linux
          path: ffi-artifacts

      - name: Restore FFI to expected path
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "temurin"
          java-version: "24"
          cache: "maven"

      - name: Set library paths for JNI
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Run Java tests
        working-directory: crates/ts-pack-java
        run: mvn test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSPACK_LIB_PATH: ${{ github.workspace }}/target/release/libts_pack_ffi.so

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: java-unit-reports
          path: crates/ts-pack-java/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

  e2e-java:
    name: Java E2E tests
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ffi-linux
          path: ffi-artifacts

      - name: Restore FFI to expected path
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "temurin"
          java-version: "24"
          cache: "maven"

      - name: Build Java jar
        working-directory: crates/ts-pack-java
        run: mvn package -DskipTests
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"
          TSLP_LINK_MODE: static

      - name: Generate E2E tests
        run: cargo run -p e2e-generator -- generate --lang java
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Set library paths for JNI
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Run E2E tests
        working-directory: e2e/java
        run: mvn test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSPACK_LIB_PATH: ${{ github.workspace }}/target/release/libts_pack_ffi.so
          MAVEN_OPTS: "--enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow"

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: java-e2e-reports
          path: e2e/java/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7
