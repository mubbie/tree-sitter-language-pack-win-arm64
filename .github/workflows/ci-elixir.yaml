name: CI Elixir

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-elixir.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-elixir/**'
      - 'e2e/elixir/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/elixir.yml'
      - 'Taskfile.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-elixir.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-elixir/**'
      - 'e2e/elixir/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/elixir.yml'
      - 'Taskfile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-elixir-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  test-elixir:
    name: Elixir Build and Test
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Elixir
        uses: erlef/setup-elixir@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1.22.0
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0

      - name: Cache Elixir dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            crates/ts-pack-elixir/deps
            crates/ts-pack-elixir/_build
          key: elixir-deps-${{ runner.os }}-${{ hashFiles('crates/ts-pack-elixir/mix.lock') }}
          restore-keys: |
            elixir-deps-${{ runner.os }}-

      - name: Install Elixir dependencies
        run: task elixir:deps

      - name: Compile Elixir (warnings as errors)
        working-directory: crates/ts-pack-elixir
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Run Elixir tests
        run: task elixir:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}

  e2e-elixir:
    name: Elixir E2E Tests
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Elixir
        uses: erlef/setup-elixir@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1.22.0
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@0bfa0fc19b347b4aa1aba452ce0cbca16237634b # v1.0.0

      - name: Generate E2E tests
        run: task elixir:e2e:generate
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run E2E tests
        run: task elixir:e2e:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
