name: CI WASM

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-wasm.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-wasm/**'
      - 'e2e/wasm/**'
      - 'tools/e2e-generator/**'
      - '.task/wasm.yml'
      - 'scripts/clone_vendors.py'
      - 'scripts/readme_config.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'fixtures/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-wasm.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-core/**'
      - 'crates/ts-pack-wasm/**'
      - 'e2e/wasm/**'
      - 'tools/e2e-generator/**'
      - '.task/wasm.yml'
      - 'scripts/clone_vendors.py'
      - 'scripts/readme_config.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'fixtures/**'
  workflow_dispatch:

concurrency:
  group: ci-wasm-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:

  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v4
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-wasm:
    name: Build WASM
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Clippy (ts-pack-wasm)
        run: cargo clippy -p ts-pack-wasm --target wasm32-unknown-unknown -- -D warnings
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build WASM (web target)
        working-directory: crates/ts-pack-wasm
        run: wasm-pack build --target web --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Verify WASM binary exists and check size
        shell: bash
        run: |
          WASM_FILE="crates/ts-pack-wasm/pkg/ts_pack_wasm_bg.wasm"
          if [ ! -f "$WASM_FILE" ]; then
            echo "ERROR: WASM binary not found at $WASM_FILE"
            exit 1
          fi
          SIZE=$(stat --format=%s "$WASM_FILE" 2>/dev/null || stat -f%z "$WASM_FILE")
          echo "WASM binary size: $SIZE bytes ($(( SIZE / 1024 )) KB)"
          if [ "$SIZE" -lt 1024 ]; then
            echo "ERROR: WASM binary is suspiciously small ($SIZE bytes)"
            exit 1
          fi

      - name: Verify generated files
        shell: bash
        run: |
          for FILE in \
            crates/ts-pack-wasm/pkg/ts_pack_wasm.js \
            crates/ts-pack-wasm/pkg/ts_pack_wasm.d.ts \
            crates/ts-pack-wasm/pkg/ts_pack_wasm_bg.wasm; do
            if [ ! -f "$FILE" ]; then
              echo "ERROR: Expected file missing: $FILE"
              exit 1
            fi
            echo "OK: $FILE"
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: |
            crates/ts-pack-wasm/pkg/*.wasm
            crates/ts-pack-wasm/pkg/*.js
            crates/ts-pack-wasm/pkg/*.ts
            crates/ts-pack-wasm/pkg/package.json
          retention-days: 7

  build-wasm-node:
    name: Build WASM (Node.js target)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (Node.js target)
        working-directory: crates/ts-pack-wasm
        run: wasm-pack build --target nodejs --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Verify WASM binary exists
        shell: bash
        run: |
          WASM_FILE="crates/ts-pack-wasm/pkg/ts_pack_wasm_bg.wasm"
          if [ ! -f "$WASM_FILE" ]; then
            echo "ERROR: WASM binary not found at $WASM_FILE"
            exit 1
          fi
          SIZE=$(stat --format=%s "$WASM_FILE" 2>/dev/null || stat -f%z "$WASM_FILE")
          echo "WASM binary size: $SIZE bytes ($(( SIZE / 1024 )) KB)"

  e2e-tests:
    name: E2E Tests (WASM)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: crates/ts-pack-wasm/pkg/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install E2E dependencies
        working-directory: e2e/wasm
        run: npm install

      - name: Run E2E tests
        working-directory: e2e/wasm
        run: npx vitest run
