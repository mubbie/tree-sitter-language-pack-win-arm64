name: CI C FFI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-c.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-core/**'
      - 'e2e/c/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/c.yml'
      - 'Taskfile.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-c.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-core/**'
      - 'e2e/c/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/c.yml'
      - 'Taskfile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-c-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-and-test:
    name: C FFI Tests
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parsers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Generate C E2E tests
        run: task c:e2e:generate
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Build and run C tests
        run: task c:e2e:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
