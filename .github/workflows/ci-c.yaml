name: CI C FFI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-c.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-core/**'
      - 'e2e/c/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/c.yml'
      - 'Taskfile.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-c.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/ts-pack-ffi/**'
      - 'crates/ts-pack-core/**'
      - 'e2e/c/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'scripts/**'
      - '.task/c.yml'
      - 'Taskfile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-c-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v4
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-and-test:
    name: C FFI Tests
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Generate C E2E tests
        run: task c:e2e:generate
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build and run C tests
        run: task c:e2e:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
