version: "3.0"
name: tree-sitter-language-pack
description: Comprehensive tree-sitter grammar compilation and polyglot parser bindings
presets:
  - claude
  - codex
builtins:
  - rust
  - python
  - pyo3
  - typescript
  - napi-rs
  - ruby
  - magnus
  - go
  - java
  - elixir
  - rustler
  - wasm
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands
includes:
  - name: kreuzberg-shared
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    merge_strategy: local-override
profiles:
  full:
    - parser-compilation
    - language-management
default: full
gitignore: true
